name: Anya Kernel — Matrix CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: staging
        type: choice
        options:
          - main
          - staging
          - linux-stable
          - linux-staging

      build_type:
        description: "Build variant"
        required: true
        default: susfs
        type: choice
        options:
          - all
          - susfs
          - vanilla

      clang:
        description: "Clang toolchain"
        required: true
        default: greenforce
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "[${{ matrix.name }}] · ${{ github.event.inputs.clang }} · ${{ github.event.inputs.branch }}"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: KSU+SUSFS
            type: susfs
            zip_suffix: Kernel-KSU-SUSFS
            release_base: AnyaKernel-GKI-5.10
            build_host: anyaprjkt
            telegram_label: "KSU Next + SUSFS"
            telegram_tags_main: "#Anyakernel #update #gki510 #ksu #susfs"
            telegram_tags_staging: "#Anyakernel #staging #gki510 #ksu #susfs"
            release_tags_main: "#Anyakernel #gki-5.10 #ksu #susfs"
            release_tags_staging: "#Anyakernel #staging #gki-5.10 #ksu #susfs"

          - name: Vanilla
            type: vanilla
            zip_suffix: Kernel-Vanilla
            release_base: AnyaKernel-Vanilla-5.10
            build_host: anyaprjkt
            telegram_label: "Vanilla (No KSU/SUSFS)"
            telegram_tags_main: "#Anyakernel #vanilla #gki510"
            telegram_tags_staging: "#Anyakernel #staging #vanilla #gki510"
            release_tags_main: "#Anyakernel #vanilla #gki-5.10"
            release_tags_staging: "#Anyakernel #staging #vanilla #gki-5.10"

    steps:
      - name: Evaluate build target
        id: gate
        run: |
          INPUT="${{ github.event.inputs.build_type }}"
          TYPE="${{ matrix.type }}"
          if [[ "$INPUT" == "all" || "$INPUT" == "$TYPE" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve branch variables
        if: steps.gate.outputs.should_run == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch }}"

          if [[ "$BRANCH" == "staging" ]]; then
            IS_STAGING=true
            ZIP_NAME="${{ matrix.zip_suffix }}-Staging.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}-Staging"
            TELEGRAM_VERSION="${{ matrix.telegram_label }} [STAGING]"
            TELEGRAM_TAGS="${{ matrix.telegram_tags_staging }}"
            RELEASE_TAGS="${{ matrix.release_tags_staging }}"
          else
            IS_STAGING=false
            ZIP_NAME="${{ matrix.zip_suffix }}.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}"
            TELEGRAM_VERSION="${{ matrix.telegram_label }}"
            TELEGRAM_TAGS="${{ matrix.telegram_tags_main }}"
            RELEASE_TAGS="${{ matrix.release_tags_main }}"
          fi

          {
            echo "IS_STAGING=$IS_STAGING"
            echo "KERNEL_BRANCH=$BRANCH"
            echo "ZIP_NAME=$ZIP_NAME"
            echo "RELEASE_PREFIX=$RELEASE_PREFIX"
            echo "TELEGRAM_VERSION=$TELEGRAM_VERSION"
            echo "TELEGRAM_TAGS=$TELEGRAM_TAGS"
            echo "RELEASE_TAGS=$RELEASE_TAGS"
          } >> "$GITHUB_ENV"

      - name: Resolve toolchain
        if: steps.gate.outputs.should_run == 'true'
        run: |
          gh_latest_asset() {
            local REPO="$1" EXT="$2" PAYLOAD TAG URL
            PAYLOAD=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest")
            TAG=$(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            URL=$(echo "$PAYLOAD" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          asset = next(a for a in r['assets'] if a['name'].endswith('${EXT}'))
          print(asset['browser_download_url'])
          ")
            echo "${TAG}|${URL}"
          }

          case "${{ github.event.inputs.clang }}" in
            greenforce)
              RESULT=$(gh_latest_asset "greenforce-project/greenforce_clang" ".tar.gz")
              TAG="${RESULT%%|*}"
              CLANG_URL="${RESULT##*|}"
              CLANG_TYPE="dir"
              CLANG_CACHE_KEY="greenforce-clang-${TAG}"
              ;;
            llvm)
              LLVM_VER=$(curl -fsSL https://mirrors.edge.kernel.org/pub/tools/llvm/files/ \
                | grep -oP 'llvm-\K[\d.]+(?=-x86_64\.tar\.gz)' \
                | sort -V | tail -1)
              CLANG_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-${LLVM_VER}-x86_64.tar.gz"
              CLANG_TYPE="flat"
              CLANG_CACHE_KEY="llvm-${LLVM_VER}"
              ;;
            zyc)
              RESULT=$(gh_latest_asset "ZyCromerZ/Clang" ".tar.gz")
              TAG="${RESULT%%|*}"
              CLANG_URL="${RESULT##*|}"
              CLANG_TYPE="dir"
              CLANG_CACHE_KEY="zyc-clang-${TAG}"
              ;;
            aosp)
              RESULT=$(gh_latest_asset "ip2na/aosp_clang_mirror" ".tar.gz")
              TAG="${RESULT%%|*}"
              CLANG_URL="${RESULT##*|}"
              CLANG_TYPE="dir"
              CLANG_CACHE_KEY="aosp-clang-${TAG}"
              ;;
          esac

          CLANG_DIR="$(basename "$CLANG_URL")"
          CLANG_DIR="${CLANG_DIR%.tar.gz}"
          CLANG_DIR="${CLANG_DIR%.tar.xz}"

          {
            echo "CLANG_URL=$CLANG_URL"
            echo "CLANG_TYPE=$CLANG_TYPE"
            echo "CLANG_DIR=$CLANG_DIR"
            echo "CLANG_CACHE_KEY=$CLANG_CACHE_KEY"
          } >> "$GITHUB_ENV"

      - name: Set release tag
        if: steps.gate.outputs.should_run == 'true'
        run: |
          if [[ "$IS_STAGING" == "true" ]]; then
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Reclaim disk space
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean -qq

      - name: Install build dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex \
            libssl-dev libelf-dev zip cpio

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Restore toolchain cache
        if: steps.gate.outputs.should_run == 'true'
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      - name: Download and extract toolchain
        if: steps.gate.outputs.should_run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          wget -q -O clang-dl.tar.gz "$CLANG_URL"

          if [[ "$CLANG_TYPE" == "flat" ]]; then
            tar -xzf clang-dl.tar.gz
          else
            mkdir -p "$CLANG_DIR"
            tar -xzf clang-dl.tar.gz -C "$CLANG_DIR"
          fi

          rm clang-dl.tar.gz

      - name: Export toolchain to PATH
        if: steps.gate.outputs.should_run == 'true'
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> "$GITHUB_ENV"

      - name: Clone kernel source
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone \
            --branch "$KERNEL_BRANCH" \
            --depth=1 \
            "${{ secrets.KERNEL_SOURCE }}" \
            kernel

      - name: Integrate KernelSU Next + SUSFS
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel

          curl -LSs \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" \
            | bash -s dev-susfs

          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu \
            -b gki-android12-5.10 \
            .susfs

          echo "SUSFS_COMMIT=$(git -C .susfs log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          PATCHES="$(pwd)/.susfs/kernel_patches"
          cp -R "$PATCHES/fs/"*      ./fs/
          cp -R "$PATCHES/include/"* ./include/
          patch -p1 < "$PATCHES"/*.patch

      - name: Apply all-managers patch
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/ksun-allmanager.patch
          patch -p1 --forward -d kernel/KernelSU-Next < /tmp/ksun-allmanager.patch

      - name: Apply defconfig overlay
        if: steps.gate.outputs.should_run == 'true'
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}"   >> "$DEFCONFIG"
          else
            printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
          fi

      - name: Compile kernel
        if: steps.gate.outputs.should_run == 'true'
        run: |
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="${{ matrix.build_host }}"

          MAKE_ARGS=(
            ARCH=arm64
            LLVM=1
            LLVM_IAS=1
            O=out
            CROSS_COMPILE=aarch64-linux-gnu-
          )

          cd kernel
          make "${MAKE_ARGS[@]}" gki_defconfig
          make "${MAKE_ARGS[@]}" -j"$(nproc --all)" Image

      - name: Collect build metadata
        if: steps.gate.outputs.should_run == 'true'
        run: |
          {
            echo "GIT_BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)"
            echo "GIT_COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' kernel/out/include/generated/utsrelease.h)"
            echo "COMPILER=$("$CLANG_PATH/clang" --version | head -n1)"
            echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
          } >> "$GITHUB_ENV"

      - name: Package flashable ZIP
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone --depth=1 -b gki-2.0 "${{ secrets.AK3_REPO }}" ak3
          cp kernel/out/arch/arm64/boot/Image ak3/
          cd ak3 && zip -r9 "$ZIP_NAME" . --exclude '*.git*' --exclude '*.github*'

      - name: Prune old GitHub Releases
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          STALE=$(gh release list \
            --repo AnyaKernel/Kernel-Release \
            --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[25:] | .[].tagName')

          for TAG in $STALE; do
            gh release delete "$TAG" \
              --repo AnyaKernel/Kernel-Release \
              --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Publish GitHub Release
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          EXTRA_NOTES=""
          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            EXTRA_NOTES="**🔐 KSU commit:** $KSU_COMMIT
          **🛡️ SUSFS commit:** $SUSFS_COMMIT"
          fi

          COMMON_BODY="**🌿 Branch:** \`$GIT_BRANCH\`
          **🐧 Linux version:** \`$KERNEL_VER\`
          **📆 Build date:** \`$BUILD_DATE\`
          **🦎 Variant:** $TELEGRAM_VERSION
          **♻️ Latest commit:** $GIT_COMMIT
          $EXTRA_NOTES
          **⚙️ Compiler:** $COMPILER

          ---
          $RELEASE_TAGS"

          if [[ "$IS_STAGING" == "true" ]]; then
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "⚠️ [STAGING] Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## ⚠️ STAGING BUILD — Anya Kernel — $TELEGRAM_VERSION

          > Built from the **staging** branch. Not intended for daily use.

          $COMMON_BODY" \
              --prerelease \
            || gh release upload "$RELEASE_TAG" \
                --repo AnyaKernel/Kernel-Release \
                "ak3/$ZIP_NAME" \
                --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## 🌸 Anya Kernel — $TELEGRAM_VERSION

          $COMMON_BODY" \
              --latest
          fi

      - name: Send Telegram notification
        if: steps.gate.outputs.should_run == 'true'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          RELEASE_URL="https://github.com/AnyaKernel/Kernel-Release/releases/tag/$RELEASE_TAG"

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            printf 'EXTRA_INFO=\n🔐 <b>KSU commit:</b> %s\n🛡️ <b>SUSFS commit:</b> %s\n' \
              "$KSU_COMMIT" "$SUSFS_COMMIT" >> "$GITHUB_ENV"
          else
            echo "EXTRA_INFO=" >> "$GITHUB_ENV"
          fi

          if [[ "$IS_STAGING" == "true" ]]; then
            echo "STAGING_HEADER=⚠️ <b>[STAGING BUILD]</b>" >> "$GITHUB_ENV"
          else
            echo "STAGING_HEADER=" >> "$GITHUB_ENV"
          fi

          export RELEASE_URL

          python3 - <<'PYEOF'
          import os, urllib.request, urllib.parse

          staging = os.environ.get("STAGING_HEADER", "")
          extra   = os.environ.get("EXTRA_INFO", "")
          prefix  = f"{staging}\n\n" if staging else ""

          msg = (
            f"{prefix}"
            f"<b>Anya Kernel \u2014 {os.environ['TELEGRAM_VERSION']}</b>\n"
            f"\U0001f331 <b>Branch:</b> <code>{os.environ['GIT_BRANCH']}</code>\n"
            f"\U0001f427 <b>Linux version:</b> <code>{os.environ['KERNEL_VER']}</code>\n"
            f"\U0001f4c6 <b>Build date:</b> <code>{os.environ['BUILD_DATE']}</code>\n"
            f"\U0001f98e <b>Variant:</b> {os.environ['TELEGRAM_VERSION']}\n"
            f"\u267b\ufe0f <b>Latest commit:</b> {os.environ['GIT_COMMIT']}"
            f"{extra}\n"
            f"\u2699\ufe0f <b>Compiler:</b> {os.environ['COMPILER']}\n\n"
            f"{os.environ['TELEGRAM_TAGS']}\n\n"
            f"\U0001f4e5 <b>Download:</b> "
            f"<a href=\"{os.environ['RELEASE_URL']}\">GitHub Release</a>"
          )

          payload = urllib.parse.urlencode({
            "chat_id":                  os.environ["CHAT_ID"],
            "parse_mode":               "HTML",
            "disable_web_page_preview": "true",
            "text":                     msg,
          }).encode()

          req = urllib.request.Request(
            f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
            data=payload,
            method="POST",
          )
          with urllib.request.urlopen(req) as resp:
            print(resp.read().decode())
          PYEOF
