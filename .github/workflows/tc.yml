name: Anya Kernel — Matrix CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - staging
          - linux-stable
          - linux-staging
          - personal-use
      build_type:
        description: "Build variant"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - susfs
          - vanilla
      clang:
        description: "Clang toolchain"
        required: true
        default: "greenforce"
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "KSU + SUSFS"
            type: susfs
            zip_suffix: Kernel-KSU-SUSFS
            build_host: anyaprjkt
            tg_label: "KSU Next + SUSFS"
            tg_tags_main: "#Anyakernel #update #gki510 #ksu #susfs"
            tg_tags_staging: "#Anyakernel #staging #gki510 #ksu #susfs"

          - name: "Vanilla"
            type: vanilla
            zip_suffix: Kernel-Vanilla
            build_host: Anyaanasera
            tg_label: "Vanilla"
            tg_tags_main: "#Anyakernel #vanilla #gki510"
            tg_tags_staging: "#Anyakernel #staging #vanilla #gki510"

    steps:
      # ── Gate ──────────────────────────────────────────────────────────────
      # Skip this matrix leg early if the selected build_type doesn't match.
      - name: Evaluate build target
        id: gate
        run: |
          if [[ "${{ github.event.inputs.build_type }}" == "all" || \
                "${{ github.event.inputs.build_type }}" == "${{ matrix.type }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      # ── Environment ───────────────────────────────────────────────────────
      # Derive all branch-dependent naming variables up front so every
      # subsequent step reads from $GITHUB_ENV without conditionals.
      - name: Resolve build environment
        if: steps.gate.outputs.run == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch }}"

          if [[ "$BRANCH" == "staging" ]]; then
            {
              echo "IS_STAGING=true"
              echo "KERNEL_BRANCH=staging"
              echo "ZIP_NAME=${{ matrix.zip_suffix }}-Staging.zip"
              echo "TG_VERSION=${{ matrix.tg_label }} [STAGING]"
              echo "TG_TAGS=${{ matrix.tg_tags_staging }}"
            } >> $GITHUB_ENV
          else
            {
              echo "IS_STAGING=false"
              echo "KERNEL_BRANCH=$BRANCH"
              echo "ZIP_NAME=${{ matrix.zip_suffix }}.zip"
              echo "TG_VERSION=${{ matrix.tg_label }}"
              echo "TG_TAGS=${{ matrix.tg_tags_main }}"
            } >> $GITHUB_ENV
          fi

      # Resolve toolchain URL, extraction strategy, and cache key.
      - name: Resolve toolchain
        if: steps.gate.outputs.run == 'true'
        run: |
          case "${{ github.event.inputs.clang }}" in
            greenforce)
              URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz"
              LAYOUT="wrap" ;;
            llvm)
              URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.4-x86_64.tar.gz"
              LAYOUT="flat" ;;
            zyc)
              URL="https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz"
              LAYOUT="wrap" ;;
            aosp)
              URL="https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r584948b-14863223/clang-r584948b.tar.gz"
              LAYOUT="wrap" ;;
          esac

          DIR="$(basename "$URL" .tar.gz)"
          {
            echo "CLANG_URL=$URL"
            echo "CLANG_LAYOUT=$LAYOUT"
            echo "CLANG_DIR=$DIR"
            echo "CLANG_CACHE_KEY=$DIR"
          } >> $GITHUB_ENV

      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Reclaim disk space
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean -q

      - name: Install build dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison cpio curl flex git \
            libelf-dev libssl-dev python3-requests \
            wget zip

      # ── Toolchain ─────────────────────────────────────────────────────────
      - name: Restore toolchain cache
        if: steps.gate.outputs.run == 'true'
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      # Two extraction strategies:
      #   flat   — archive already contains a top-level named directory (LLVM dist tarballs).
      #   wrap   — archive dumps files at root; we create the target directory ourselves.
      - name: Download toolchain
        if: steps.gate.outputs.run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          if [[ "$CLANG_LAYOUT" == "flat" ]]; then
            wget -q "$CLANG_URL"
            tar -zxf "$(basename "$CLANG_URL")"
            rm  -f  "$(basename "$CLANG_URL")"
          else
            mkdir -p "$CLANG_DIR"
            wget -q -O clang.tar.gz "$CLANG_URL"
            tar -zxf clang.tar.gz -C "$CLANG_DIR"
            rm  -f  clang.tar.gz
          fi

      - name: Export toolchain path
        if: steps.gate.outputs.run == 'true'
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> $GITHUB_ENV

      # ── Source ────────────────────────────────────────────────────────────
      # Strip any accidental whitespace from the secret before passing to git.
      - name: Clone kernel source
        if: steps.gate.outputs.run == 'true'
        run: |
          KSRC="$(echo '${{ secrets.KERNEL_SOURCE }}' | xargs)"
          git clone --branch "$KERNEL_BRANCH" --depth=1 "$KSRC" kernel

      # ── KernelSU-Next + SUSFS integration (susfs variant only) ────────────
      - name: Integrate KernelSU-Next
        if: steps.gate.outputs.run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel
          curl -LSs \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" \
            | bash -s dev-susfs
          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV

      - name: Integrate SUSFS
        if: steps.gate.outputs.run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel
          git clone --depth=1 \
            -b gki-android12-5.10 \
            https://gitlab.com/simonpunk/susfs4ksu \
            .susfs
          echo "SUSFS_COMMIT=$(git -C .susfs log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV

          PATCHES=".susfs/kernel_patches"
          cp -R "$PATCHES/fs/"*      ./fs/
          cp -R "$PATCHES/include/"* ./include/
          patch -p1 --forward < "$PATCHES"/*.patch || true

      - name: Apply all-managers patch
        if: steps.gate.outputs.run == 'true' && matrix.type == 'susfs'
        run: |
          curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/allmanager.patch
          patch -p1 --forward -d kernel/KernelSU-Next < /tmp/allmanager.patch

      # ── Config ────────────────────────────────────────────────────────────
      - name: Inject defconfig overlay
        if: steps.gate.outputs.run == 'true'
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"
          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}"  >> "$DEFCONFIG"
          else
            printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Compile
        if: steps.gate.outputs.run == 'true'
        run: |
          cd kernel
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="${{ matrix.build_host }}"

          MAKE=(make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu-)
          "${MAKE[@]}" gki_defconfig
          "${MAKE[@]}" -j"$(nproc --all)" Image

      - name: Collect build metadata
        if: steps.gate.outputs.run == 'true'
        run: |
          cd kernel
          {
            echo "GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)"
            echo "GIT_COMMIT=$(git log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' out/include/generated/utsrelease.h)"
            echo "COMPILER=$("$CLANG_PATH/clang" --version | head -n1)"
            echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
          } >> $GITHUB_ENV

      # ── Artifact ──────────────────────────────────────────────────────────
      - name: Package flashable ZIP
        if: steps.gate.outputs.run == 'true'
        run: |
          git clone --depth=1 -b gki-2.0 "${{ secrets.AK3_REPO }}" ak3
          cp kernel/out/arch/arm64/boot/Image ak3/
          cd ak3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" "*.github*"

      # ── Publish ───────────────────────────────────────────────────────────
      # Send the flashable ZIP directly to Telegram with a structured caption.
      # All metadata is passed as explicit env vars — no shell heredoc tricks.
      - name: Upload to Telegram
        if: steps.gate.outputs.run == 'true'
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          ZIP_NAME:     ${{ env.ZIP_NAME }}
          IS_STAGING:   ${{ env.IS_STAGING }}
          TG_VERSION:   ${{ env.TG_VERSION }}
          TG_TAGS:      ${{ env.TG_TAGS }}
          GIT_BRANCH:   ${{ env.GIT_BRANCH }}
          GIT_COMMIT:   ${{ env.GIT_COMMIT }}
          KERNEL_VER:   ${{ env.KERNEL_VER }}
          COMPILER:     ${{ env.COMPILER }}
          BUILD_DATE:   ${{ env.BUILD_DATE }}
          KSU_COMMIT:   ${{ env.KSU_COMMIT }}
          SUSFS_COMMIT: ${{ env.SUSFS_COMMIT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests

          def ev(key, default=""):
              return os.environ.get(key, default).strip()

          # Build caption
          lines = []

          if ev("IS_STAGING") == "true":
              lines.append("⚠️ <b>[STAGING BUILD]</b>\n")

          lines += [
              f"<b>🌸 Anya Kernel — {ev('TG_VERSION')}</b>",
              "",
              f"🌱 <b>Branch:</b>    <code>{ev('GIT_BRANCH')}</code>",
              f"🐧 <b>Linux:</b>     <code>{ev('KERNEL_VER')}</code>",
              f"📆 <b>Date:</b>      <code>{ev('BUILD_DATE')}</code>",
              f"♻️ <b>Commit:</b>    {ev('GIT_COMMIT')}",
          ]

          ksu = ev("KSU_COMMIT")
          sus = ev("SUSFS_COMMIT")
          if ksu and sus:
              lines += [
                  f"🔐 <b>KSU:</b>      {ksu}",
                  f"🛡️ <b>SUSFS:</b>    {sus}",
              ]

          lines += [
              f"⚙️ <b>Compiler:</b> {ev('COMPILER')}",
              "",
              ev("TG_TAGS"),
          ]

          caption  = "\n".join(lines)
          zip_name = ev("ZIP_NAME")

          with open(zip_name, "rb") as fh:
              resp = requests.post(
                  f"https://api.telegram.org/bot{ev('BOT_TOKEN')}/sendDocument",
                  data={
                      "chat_id":    ev("CHAT_ID"),
                      "caption":    caption,
                      "parse_mode": "HTML",
                  },
                  files={"document": (zip_name, fh, "application/zip")},
                  timeout=300,
              )

          if resp.ok:
              print("artifact dispatched.")
          else:
              print(f"upload failed [{resp.status_code}]: {resp.text}", file=sys.stderr)
              sys.exit(1)
          PYEOF
