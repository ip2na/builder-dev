name: Anya Kernel Ps — Matrix CI

# ─────────────────────────────────────────────
#  Trigger
# ─────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - staging
          - linux-stable
          - linux-staging
          - personal-use
      build_type:
        description: "Build type"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - susfs
          - vanilla
      clang:
        description: "Clang toolchain"
        required: true
        default: "greenforce"
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

# ─────────────────────────────────────────────
#  Jobs
# ─────────────────────────────────────────────
jobs:
  build:
    name: "Build [${{ matrix.name }}]"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: KSU+SUSFS
            type: susfs
            zip_suffix: Kernel-KSU-SUSFS
            build_host: anyaprjkt
            tg_label: "KSU Next + SUSFS"
            tg_tags_main: "#Anyakernel #update #gki510 #ksu #susfs"
            tg_tags_staging: "#Anyakernel #staging #gki510 #ksu #susfs"

          - name: Vanilla
            type: vanilla
            zip_suffix: Kernel-Vanilla
            build_host: Anyaanasera
            tg_label: "Vanilla (No KSU/SUSFS)"
            tg_tags_main: "#Anyakernel #vanilla #gki510"
            tg_tags_staging: "#Anyakernel #staging #vanilla #gki510"

    steps:
      # ── 0. Gate: skip matrix leg if not selected ──────────────────────────
      - name: Check matrix target
        id: gate
        run: |
          INPUT="${{ github.event.inputs.build_type }}"
          TYPE="${{ matrix.type }}"
          if [ "$INPUT" = "all" ] || [ "$INPUT" = "$TYPE" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      # ── 1. Resolve branch / naming variables ──────────────────────────────
      - name: Resolve variables
        if: steps.gate.outputs.run == 'true'
        run: |
          BRANCH_INPUT="${{ github.event.inputs.branch }}"

          if [ "$BRANCH_INPUT" = "staging" ]; then
            echo "IS_STAGING=true"                                        >> $GITHUB_ENV
            echo "KERNEL_BRANCH=staging"                                  >> $GITHUB_ENV
            echo "ZIP_NAME=${{ matrix.zip_suffix }}-Staging.zip"         >> $GITHUB_ENV
            echo "TG_VERSION=${{ matrix.tg_label }} [STAGING]"           >> $GITHUB_ENV
            echo "TG_TAGS=${{ matrix.tg_tags_staging }}"                 >> $GITHUB_ENV
          else
            echo "IS_STAGING=false"                                       >> $GITHUB_ENV
            echo "KERNEL_BRANCH=$BRANCH_INPUT"                            >> $GITHUB_ENV
            echo "ZIP_NAME=${{ matrix.zip_suffix }}.zip"                  >> $GITHUB_ENV
            echo "TG_VERSION=${{ matrix.tg_label }}"                     >> $GITHUB_ENV
            echo "TG_TAGS=${{ matrix.tg_tags_main }}"                    >> $GITHUB_ENV
          fi

      # ── 2. Resolve toolchain URL & cache key ──────────────────────────────
      - name: Resolve toolchain
        if: steps.gate.outputs.run == 'true'
        run: |
          case "${{ github.event.inputs.clang }}" in
            greenforce)
              URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260410/gf-clang-22.1.4-20260410.tar.gz"
              TYPE="wrap"
              ;;
            llvm)
              URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.4-x86_64.tar.gz"
              TYPE="flat"
              ;;
            zyc)
              URL="https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250401-release/Clang-20.0.0git-20250401.tar.gz"
              TYPE="wrap"
              ;;
            aosp)
              URL="https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r584948b-14863223/clang-r584948b.tar.gz"
              TYPE="wrap"
              ;;
          esac
          DIR=$(basename "$URL" .tar.gz)
          echo "CLANG_URL=$URL"       >> $GITHUB_ENV
          echo "CLANG_TYPE=$TYPE"     >> $GITHUB_ENV
          echo "CLANG_DIR=$DIR"       >> $GITHUB_ENV
          echo "CLANG_CACHE_KEY=$DIR" >> $GITHUB_ENV

      # ── 3. Checkout workflow repo ─────────────────────────────────────────
      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      # ── 4. Free disk space ────────────────────────────────────────────────
      - name: Reclaim disk space
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean -q

      # ── 5. Install build dependencies ─────────────────────────────────────
      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex \
            libssl-dev libelf-dev zip cpio python3-requests

      # ── 6. Restore cached toolchain ───────────────────────────────────────
      - name: Restore toolchain cache
        if: steps.gate.outputs.run == 'true'
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      # ── 7. Download toolchain (cache miss only) ───────────────────────────
      - name: Download Clang
        if: steps.gate.outputs.run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          if [ "$CLANG_TYPE" = "flat" ]; then
            # Archive extracts to a named dir already (llvm-style)
            wget -q "$CLANG_URL"
            tar -zxf "$(basename "$CLANG_URL")"
            rm  -f  "$(basename "$CLANG_URL")"
          else
            # Archive contains files at root; wrap in our own dir
            mkdir -p "$CLANG_DIR"
            wget -q -O clang.tar.gz "$CLANG_URL"
            tar -zxf clang.tar.gz -C "$CLANG_DIR"
            rm  -f  clang.tar.gz
          fi

      # ── 8. Export Clang bin path ──────────────────────────────────────────
      - name: Export Clang path
        if: steps.gate.outputs.run == 'true'
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> $GITHUB_ENV

      # ── 9. Clone kernel source ────────────────────────────────────────────
      - name: Clone kernel source
        if: steps.gate.outputs.run == 'true'
        run: |
          git clone \
            --branch "$KERNEL_BRANCH" \
            --depth=1 \
            "${{ secrets.KERNEL_SOURCE }}" \
            kernel

      # ── 10. Integrate KernelSU-Next + SUSFS (susfs only) ─────────────────
      - name: Integrate KernelSU-Next + SUSFS
        if: steps.gate.outputs.run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel

          # KernelSU-Next
          curl -LSs \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" \
            | bash -s dev-susfs
          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV

          # SUSFS
          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu \
            -b gki-android12-5.10 \
            .susfs
          echo "SUSFS_COMMIT=$(git -C .susfs log -1 --pretty=format:'%s (%an)')" >> $GITHUB_ENV

          # Apply patches
          PATCHES=".susfs/kernel_patches"
          cp -R "$PATCHES/fs/"*      ./fs/
          cp -R "$PATCHES/include/"* ./include/
          patch -p1 --forward < "$PATCHES"/*.patch || true

      # ── 11. Apply all-managers patch (susfs only) ─────────────────────────
      - name: Apply all-managers patch
        if: steps.gate.outputs.run == 'true' && matrix.type == 'susfs'
        run: |
          curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/allmanager.patch
          patch -p1 --forward -d kernel/KernelSU-Next < /tmp/allmanager.patch

      # ── 12. Inject defconfig lines ────────────────────────────────────────
      - name: Apply defconfig overlay
        if: steps.gate.outputs.run == 'true'
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"
          if [ "${{ matrix.type }}" = "susfs" ]; then
            printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}" >> "$DEFCONFIG"
          else
            printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
          fi

      # ── 13. Compile ───────────────────────────────────────────────────────
      - name: Compile
        if: steps.gate.outputs.run == 'true'
        run: |
          cd kernel
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="${{ matrix.build_host }}"
          MAKE="make ARCH=arm64 LLVM=1 LLVM_IAS=1 O=out CROSS_COMPILE=aarch64-linux-gnu-"
          $MAKE gki_defconfig
          $MAKE -j$(nproc --all) Image

      # ── 14. Collect build metadata ────────────────────────────────────────
      - name: Collect build metadata
        if: steps.gate.outputs.run == 'true'
        run: |
          cd kernel
          echo "GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)"                                >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git log -1 --pretty=format:'%s (%an)')"                          >> $GITHUB_ENV
          echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' out/include/generated/utsrelease.h)"  >> $GITHUB_ENV
          echo "COMPILER=$("$CLANG_PATH/clang" --version | head -n1)"                         >> $GITHUB_ENV
          echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"                     >> $GITHUB_ENV

      # ── 15. Package AnyKernel3 ZIP ────────────────────────────────────────
      - name: Package flashable ZIP
        if: steps.gate.outputs.run == 'true'
        run: |
          git clone --depth=1 -b gki-2.0 "${{ secrets.AK3_REPO }}" ak3
          cp kernel/out/arch/arm64/boot/Image ak3/
          cd ak3 && zip -r9 "../$ZIP_NAME" . -x "*.git*" "*.github*"

      # ── 16. Upload ZIP + caption to Telegram ─────────────────────────────
      - name: Upload to Telegram
        if: steps.gate.outputs.run == 'true'
        env:
          BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.CHAT_ID }}
          ZIP_NAME:     ${{ env.ZIP_NAME }}
          IS_STAGING:   ${{ env.IS_STAGING }}
          TG_VERSION:   ${{ env.TG_VERSION }}
          TG_TAGS:      ${{ env.TG_TAGS }}
          GIT_BRANCH:   ${{ env.GIT_BRANCH }}
          GIT_COMMIT:   ${{ env.GIT_COMMIT }}
          KERNEL_VER:   ${{ env.KERNEL_VER }}
          COMPILER:     ${{ env.COMPILER }}
          BUILD_DATE:   ${{ env.BUILD_DATE }}
          KSU_COMMIT:   ${{ env.KSU_COMMIT }}
          SUSFS_COMMIT: ${{ env.SUSFS_COMMIT }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests

          def e(k, default=""):
              return os.environ.get(k, default).strip()

          # ── Compose caption ────────────────────────────────────────────────
          lines = []

          if e("IS_STAGING") == "true":
              lines.append("⚠️ <b>[STAGING BUILD]</b>\n")

          lines += [
              f"<b>🌸 Anya Kernel — {e('TG_VERSION')}</b>",
              "",
              f"🌱 <b>Branch:</b>     <code>{e('GIT_BRANCH')}</code>",
              f"🐧 <b>Linux:</b>      <code>{e('KERNEL_VER')}</code>",
              f"📆 <b>Date:</b>       <code>{e('BUILD_DATE')}</code>",
              f"♻️ <b>Commit:</b>     {e('GIT_COMMIT')}",
          ]

          ksu = e("KSU_COMMIT")
          sus = e("SUSFS_COMMIT")
          if ksu and sus:
              lines += [
                  f"🔐 <b>KSU:</b>       {ksu}",
                  f"🛡️ <b>SUSFS:</b>     {sus}",
              ]

          lines += [
              f"⚙️ <b>Compiler:</b>  {e('COMPILER')}",
              "",
              e("TG_TAGS"),
          ]

          caption = "\n".join(lines)

          # ── Send document ──────────────────────────────────────────────────
          zip_name = e("ZIP_NAME")
          with open(zip_name, "rb") as f:
              resp = requests.post(
                  f"https://api.telegram.org/bot{e('BOT_TOKEN')}/sendDocument",
                  data={
                      "chat_id":    e("CHAT_ID"),
                      "caption":    caption,
                      "parse_mode": "HTML",
                  },
                  files={"document": (zip_name, f, "application/zip")},
                  timeout=300,
              )

          if resp.ok:
              print("✓ Upload successful.")
          else:
              print(f"✗ Upload failed [{resp.status_code}]: {resp.text}", file=sys.stderr)
              sys.exit(1)
          PYEOF
