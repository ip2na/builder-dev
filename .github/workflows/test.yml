name: Anya Kernel nomoun

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Kernel source branch"
        required: true
        default: staging
        type: choice
        options:
          - main
          - staging

      build_type:
        description: "Build variant"
        required: true
        default: susfs
        type: choice
        options:
          - all
          - susfs
          - vanilla

      clang:
        description: "Clang toolchain"
        required: true
        default: greenforce
        type: choice
        options:
          - greenforce
          - llvm
          - zyc
          - aosp

      nomount:
        description: "Sertakan patch NoMount?"
        required: true
        default: enable
        type: choice
        options:
          - enable
          - disable

jobs:
  build:
    name: "Build [${{ matrix.name }}]"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: KSU+SUSFS
            type: susfs
            zip_base: Kernel-KSU-SUSFS
            release_base: AnyaKernel-GKI-5.10
            build_host: anyaprjkt
            telegram_label_base: "KSU Next + SUSFS"
            telegram_tags_main_base: "#Anyakernel #update #gki510 #ksu #susfs"
            telegram_tags_staging_base: "#Anyakernel #staging #gki510 #ksu #susfs"
            release_tags_main_base: "#Anyakernel #gki-5.10 #ksu #susfs"
            release_tags_staging_base: "#Anyakernel #staging #gki-5.10 #ksu #susfs"

          - name: Vanilla
            type: vanilla
            zip_base: Kernel-Vanilla
            release_base: AnyaKernel-Vanilla-5.10
            build_host: anyaprjkt
            telegram_label_base: "Vanilla (No KSU/SUSFS)"
            telegram_tags_main_base: "#Anyakernel #vanilla #gki510"
            telegram_tags_staging_base: "#Anyakernel #staging #vanilla #gki510"
            release_tags_main_base: "#Anyakernel #vanilla #gki-5.10"
            release_tags_staging_base: "#Anyakernel #staging #vanilla #gki-5.10"

    steps:
      - name: Evaluate build target
        id: gate
        run: |
          INPUT="${{ github.event.inputs.build_type }}"
          TYPE="${{ matrix.type }}"
          if [[ "$INPUT" == "all" || "$INPUT" == "$TYPE" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve branch & nomount variables
        if: steps.gate.outputs.should_run == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          NOMOUNT_INPUT="${{ github.event.inputs.nomount }}"
          IS_STAGING=false

          if [[ "$NOMOUNT_INPUT" == "enable" ]]; then
            NOMOUNT_ENABLED=true
            ZIP_SUFFIX="${{ matrix.zip_base }}-NoMount"
            TELEGRAM_LABEL_FULL="${{ matrix.telegram_label_base }} + NoMount"
            TELEGRAM_TAGS_MAIN="${{ matrix.telegram_tags_main_base }} #nomount"
            TELEGRAM_TAGS_STAGING="${{ matrix.telegram_tags_staging_base }} #nomount"
            RELEASE_TAGS_MAIN="${{ matrix.release_tags_main_base }} #nomount"
            RELEASE_TAGS_STAGING="${{ matrix.release_tags_staging_base }} #nomount"
          else
            NOMOUNT_ENABLED=false
            ZIP_SUFFIX="${{ matrix.zip_base }}"
            TELEGRAM_LABEL_FULL="${{ matrix.telegram_label_base }}"
            TELEGRAM_TAGS_MAIN="${{ matrix.telegram_tags_main_base }}"
            TELEGRAM_TAGS_STAGING="${{ matrix.telegram_tags_staging_base }}"
            RELEASE_TAGS_MAIN="${{ matrix.release_tags_main_base }}"
            RELEASE_TAGS_STAGING="${{ matrix.release_tags_staging_base }}"
          fi

          if [[ "$BRANCH" == "staging" ]]; then
            IS_STAGING=true
            ZIP_NAME="${ZIP_SUFFIX}-Staging.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}-Staging"
            TELEGRAM_VERSION="${TELEGRAM_LABEL_FULL} [STAGING]"
            TELEGRAM_TAGS="$TELEGRAM_TAGS_STAGING"
            RELEASE_TAGS="$RELEASE_TAGS_STAGING"
          else
            ZIP_NAME="${ZIP_SUFFIX}.zip"
            RELEASE_PREFIX="${{ matrix.release_base }}"
            TELEGRAM_VERSION="$TELEGRAM_LABEL_FULL"
            TELEGRAM_TAGS="$TELEGRAM_TAGS_MAIN"
            RELEASE_TAGS="$RELEASE_TAGS_MAIN"
          fi

          {
            echo "IS_STAGING=$IS_STAGING"
            echo "NOMOUNT_ENABLED=$NOMOUNT_ENABLED"
            echo "KERNEL_BRANCH=$BRANCH"
            echo "ZIP_NAME=$ZIP_NAME"
            echo "RELEASE_PREFIX=$RELEASE_PREFIX"
            echo "TELEGRAM_VERSION=$TELEGRAM_VERSION"
            echo "TELEGRAM_TAGS=$TELEGRAM_TAGS"
            echo "RELEASE_TAGS=$RELEASE_TAGS"
          } >> "$GITHUB_ENV"

      - name: Configure toolchain
        if: steps.gate.outputs.should_run == 'true'
        run: |
          case "${{ github.event.inputs.clang }}" in
            greenforce)
              CLANG_URL="https://github.com/greenforce-project/greenforce_clang/releases/download/20260716/gf-clang-24.0.0-20260716.tar.gz"
              CLANG_TYPE="dir"
              ;;
            llvm)
              CLANG_URL="https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-22.1.8-x86_64.tar.gz"
              CLANG_TYPE="flat"
              ;;
            zyc)
              CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz"
              CLANG_TYPE="dir"
              ;;
            aosp)
              CLANG_URL="https://github.com/ip2na/aosp_clang_mirror/releases/download/clang-r547379-13174946/clang-r547379.tar.gz"
              CLANG_TYPE="dir"
              ;;
          esac

          CLANG_FILENAME="$(basename "$CLANG_URL" .tar.gz)"

          {
            echo "CLANG_URL=$CLANG_URL"
            echo "CLANG_TYPE=$CLANG_TYPE"
            echo "CLANG_DIR=$CLANG_FILENAME"
            echo "CLANG_CACHE_KEY=$CLANG_FILENAME"
          } >> "$GITHUB_ENV"

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set release tag
        if: steps.gate.outputs.should_run == 'true'
        run: |
          if [[ "$IS_STAGING" == "true" ]]; then
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${RELEASE_PREFIX}-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Reclaim disk space
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean

      - name: Install build dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex \
            libssl-dev libelf-dev zip cpio

      - name: Restore toolchain cache
        if: steps.gate.outputs.should_run == 'true'
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key: ${{ env.CLANG_CACHE_KEY }}

      - name: Download and extract Clang
        if: steps.gate.outputs.should_run == 'true' && steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          if [[ "$CLANG_TYPE" == "flat" ]]; then
            wget -q "$CLANG_URL"
            tar -xzf "$(basename "$CLANG_URL")"
            rm "$(basename "$CLANG_URL")"
          else
            mkdir -p "$CLANG_DIR"
            wget -q -O clang.tar.gz "$CLANG_URL"
            tar -xzf clang.tar.gz -C "$CLANG_DIR"
            rm clang.tar.gz
          fi

      - name: Export Clang to PATH
        if: steps.gate.outputs.should_run == 'true'
        run: echo "CLANG_PATH=$(pwd)/$CLANG_DIR/bin" >> "$GITHUB_ENV"

      - name: Clone kernel source
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone \
            --branch "$KERNEL_BRANCH" \
            --depth=1 \
            "${{ secrets.KERNEL_SOURCE }}" \
            kernel

      - name: Integrate KernelSU Next + SUSFS
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          cd kernel

          curl -LSs \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" \
            | bash -s dev-susfs

          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu \
            -b gki-android12-5.10 \
            .susfs

          echo "SUSFS_COMMIT=$(git -C .susfs log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          PATCHES="$(pwd)/.susfs/kernel_patches"
          cp -R "$PATCHES/fs/"* ./fs/
          cp -R "$PATCHES/include/"* ./include/
          patch -p1 < "$PATCHES"/*.patch

      - name: Integrate NoMount
        if: steps.gate.outputs.should_run == 'true' && env.NOMOUNT_ENABLED == 'true'
        run: |
          cd kernel

          if [[ "${{ matrix.type }}" == "vanilla" ]]; then
            NOMOUNT_BRANCH="dev"
          else
            NOMOUNT_BRANCH="master"
          fi

          git clone --depth=1 -b "$NOMOUNT_BRANCH" https://github.com/maxsteeel/nomount.git .nomount

          echo "NOMOUNT_COMMIT=$(git -C .nomount log -1 --pretty=format:'%s (%an)')" >> "$GITHUB_ENV"

          patch -p1 --forward < .nomount/kernel/patches/nomount_5.10_kernel_integration.patch
          cp .nomount/kernel/src/nomount.c fs/
          cp .nomount/kernel/src/nomount.h fs/

          rm -rf .nomount

      - name: Apply all-managers patch
        if: steps.gate.outputs.should_run == 'true' && matrix.type == 'susfs'
        run: |
          curl -LSs "${{ secrets.PATCH_URL }}" -o /tmp/ksun-allmanager.patch
          patch -p1 --forward -d kernel/KernelSU-Next < /tmp/ksun-allmanager.patch

      - name: Apply defconfig overlay
        if: steps.gate.outputs.should_run == 'true'
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/gki_defconfig"

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            printf '%s\n' "${{ secrets.CONFIG_LINES_SUSFS }}" >> "$DEFCONFIG"
          else
            printf '%s\n' "${{ secrets.CONFIG_LINES_VANILLA }}" >> "$DEFCONFIG"
          fi

      - name: Inject NoMount config
        if: steps.gate.outputs.should_run == 'true' && env.NOMOUNT_ENABLED == 'true'
        run: |
          echo "CONFIG_NOMOUNT=y" >> kernel/arch/arm64/configs/gki_defconfig

      - name: Compile kernel
        if: steps.gate.outputs.should_run == 'true'
        run: |
          export TZ="Asia/Jakarta"
          export PATH="$CLANG_PATH:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="${{ matrix.build_host }}"

          MAKE_ARGS=(
            ARCH=arm64
            LLVM=1
            LLVM_IAS=1
            O=out
            CROSS_COMPILE=aarch64-linux-gnu-
          )

          cd kernel
          make "${MAKE_ARGS[@]}" gki_defconfig
          make "${MAKE_ARGS[@]}" -j"$(nproc --all)" Image

      - name: Collect build metadata
        if: steps.gate.outputs.should_run == 'true'
        run: |
          {
            echo "GIT_BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)"
            echo "GIT_COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' kernel/out/include/generated/utsrelease.h)"
            echo "COMPILER=$("$CLANG_PATH/clang" --version | head -n1)"
            echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
          } >> "$GITHUB_ENV"

      - name: Package flashable ZIP
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git clone --depth=1 -b gki-2.0 "${{ secrets.AK3_REPO }}" ak3
          cp kernel/out/arch/arm64/boot/Image ak3/
          cd ak3 && zip -r9 "$ZIP_NAME" . --exclude '*.git*' --exclude '*.github*'

      - name: Publish GitHub Release
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          EXTRA_NOTES=""
          if [[ "$NOMOUNT_ENABLED" == "true" ]]; then
            EXTRA_NOTES="**👻 NoMount commit:** $NOMOUNT_COMMIT"
          fi

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            EXTRA_NOTES="**🔐 KSU commit:** $KSU_COMMIT
          **🛡️ SUSFS commit:** $SUSFS_COMMIT
          $EXTRA_NOTES"
          fi

          COMMON_BODY="**🌿 Branch:** \`$GIT_BRANCH\`
          **🐧 Linux version:** \`$KERNEL_VER\`
          **📆 Build date:** \`$BUILD_DATE\`
          **🦎 Variant:** $TELEGRAM_VERSION
          **♻️ Latest commit:** $GIT_COMMIT
          $EXTRA_NOTES
          **⚙️ Compiler:** $COMPILER

          ---
          $RELEASE_TAGS"

          if [[ "$IS_STAGING" == "true" ]]; then
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "⚠️ [STAGING] Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## ⚠️ STAGING BUILD — Anya Kernel — $TELEGRAM_VERSION

          > Built from the **staging** branch. Not intended for daily use.

          $COMMON_BODY" \
              --prerelease \
            || gh release upload "$RELEASE_TAG" \
                --repo AnyaKernel/Kernel-Release \
                "ak3/$ZIP_NAME" \
                --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo AnyaKernel/Kernel-Release \
              "ak3/$ZIP_NAME" \
              --title "Anya Kernel | $TELEGRAM_VERSION | GKI 5.10 | $BUILD_DATE" \
              --notes "## 🌸 Anya Kernel — $TELEGRAM_VERSION

          $COMMON_BODY" \
              --latest
          fi

      - name: Send Telegram notification
        if: steps.gate.outputs.should_run == 'true'
        run: |
          RELEASE_URL="https://github.com/AnyaKernel/Kernel-Release/releases/tag/$RELEASE_TAG"

          EXTRA_INFO=""
          if [[ "$NOMOUNT_ENABLED" == "true" ]]; then
            EXTRA_INFO="
          👻 <b>NoMount commit:</b> $NOMOUNT_COMMIT"
          fi

          if [[ "${{ matrix.type }}" == "susfs" ]]; then
            EXTRA_INFO="
          🔐 <b>KSU commit:</b> $KSU_COMMIT
          🛡️ <b>SUSFS commit:</b> $SUSFS_COMMIT${EXTRA_INFO}"
          fi

          STAGING_HEADER=""
          if [[ "$IS_STAGING" == "true" ]]; then
            STAGING_HEADER="⚠️ <b>[STAGING BUILD]</b>

          "
          fi

          MESSAGE="${STAGING_HEADER}<b>Anya Kernel — $TELEGRAM_VERSION</b>
          🌱 <b>Branch:</b> <code>$GIT_BRANCH</code>
          🐧 <b>Linux version:</b> <code>$KERNEL_VER</code>
          📆 <b>Build date:</b> <code>$BUILD_DATE</code>
          🦎 <b>Variant:</b> $TELEGRAM_VERSION
          ♻️ <b>Latest commit:</b> $GIT_COMMIT${EXTRA_INFO}
          ⚙️ <b>Compiler:</b> $COMPILER

          $TELEGRAM_TAGS

          📥 <b>Download:</b> <a href=\"$RELEASE_URL\">GitHub Release</a>"

          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MESSAGE"
