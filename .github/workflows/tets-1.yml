name: Valeryn Kernel nomoun — CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Kernel source branch
        required: true
        default: staging
        type: choice
        options:
          - staging
          - main
      variant:
        description: Build variant
        required: true
        default: vanilla
        type: choice
        options:
          - both
          - ksu
          - vanilla

env:
  KERNEL_REPO: https://github.com/ip2na/anya_xiaomi_sm6115.git
  AK3_REPO:    https://github.com/ip2na/Anykernel3.git
  AK3_BRANCH:  gki-1.0
  CLANG_TAG:   r547379
  CLANG_URL:   https://github.com/ip2na/aosp_clang_mirror/releases/download/clang-r547379-13174946/clang-r547379.tar.gz
  CLANG_DIR:   google-clang-r547379

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: SM6115 · ${{ github.event.inputs.branch }} · ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{
          github.event.inputs.variant == 'both'    && fromJson('["ksu","vanilla"]') ||
          github.event.inputs.variant == 'ksu'     && fromJson('["ksu"]') ||
          fromJson('["vanilla"]') }}

    steps:

      - name: Reclaim disk space
        run: |
          sudo rm -rf \
            /usr/share/{dotnet,swift} \
            /usr/local/lib/android \
            /opt/{ghc,hostedtoolcache/CodeQL} \
            /usr/local/share/boost
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget bc bison flex \
            libssl-dev libelf-dev zip cpio \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            zstd

      - name: Restore toolchain cache
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.CLANG_DIR }}
          key:  google-clang-${{ env.CLANG_TAG }}

      - name: Download and extract Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$CLANG_DIR"
          wget -q -O clang.tar.gz "$CLANG_URL"
          tar -xf clang.tar.gz -C "$CLANG_DIR"
          rm clang.tar.gz

      - name: Clone kernel source
        run: |
          git clone \
            --branch "${{ github.event.inputs.branch }}" \
            --depth=1 \
            "$KERNEL_REPO" \
            kernel

      - name: Integrate KernelSU Next (hookless)
        if: matrix.variant == 'ksu'
        working-directory: kernel
        run: |
          curl -LSs \
            "https://raw.githubusercontent.com/Sorayukii/KernelSU-Next/stable/kernel/setup.sh" \
            | bash -s hookless-staging

          echo "KSU_COMMIT=$(git -C KernelSU-Next log -1 --pretty=format:'%s (%an)')" \
            >> "$GITHUB_ENV"

      - name: Set KSU metadata placeholder
        if: matrix.variant == 'vanilla'
        run: echo "KSU_COMMIT=N/A" >> "$GITHUB_ENV"

      - name: Integrate NoMount
        if: matrix.variant == 'ksu'
        working-directory: kernel
        run: |
          git clone --depth=1 https://github.com/maxsteeel/nomount.git .nomount

          echo "NOMOUNT_COMMIT=$(git -C .nomount log -1 --pretty=format:'%s (%an)')" \
            >> "$GITHUB_ENV"

          patch -p1 --forward < .nomount/kernel/patches/nomount_4.19_kernel_integration.patch
          cp .nomount/kernel/src/nomount.c fs/
          cp .nomount/kernel/src/nomount.h fs/

          rm -rf .nomount

      - name: Set NoMount metadata placeholder
        if: matrix.variant == 'vanilla'
        run: echo "NOMOUNT_COMMIT=N/A" >> "$GITHUB_ENV"

      - name: Apply defconfig overlay
        run: |
          CONFIG="kernel/arch/arm64/configs/vendor/bengal-perf_defconfig"

          if [[ "${{ matrix.variant }}" == "ksu" ]]; then
            printf '%s\n' "${{ secrets.VALERYN_CONFIG_LINES_KSU }}" >> "$CONFIG"
            echo "CONFIG_NOMOUNT=y" >> "$CONFIG"
          else
            printf '%s\n' "${{ secrets.VALERYN_CONFIG_LINES_VANILLA }}" >> "$CONFIG"
          fi

          echo "--- defconfig tail (last 20 lines) ---"
          tail -20 "$CONFIG"

      - name: Compile kernel
        working-directory: kernel
        run: |
          export TZ="Asia/Jakarta"
          export PATH="${{ github.workspace }}/${{ env.CLANG_DIR }}/bin:$PATH"
          export KBUILD_BUILD_USER="builder-dev"
          export KBUILD_BUILD_HOST="anyaprjkt"

          MAKE_ARGS=(
            ARCH=arm64
            O=out
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
          )

          make "${MAKE_ARGS[@]}" vendor/bengal-perf_defconfig
          make "${MAKE_ARGS[@]}" -j"$(nproc --all)" Image.gz dtbs

      - name: Collect build metadata
        run: |
          CLANG_BIN="${{ github.workspace }}/${{ env.CLANG_DIR }}/bin"
          VARIANT_UPPER="$(echo '${{ matrix.variant }}' | tr '[:lower:]' '[:upper:]')"

          {
            echo "GIT_BRANCH=$(git -C kernel rev-parse --abbrev-ref HEAD)"
            echo "GIT_COMMIT=$(git -C kernel log -1 --pretty=format:'%s (%an)')"
            echo "KERNEL_VER=$(sed 's/.*\"\(.*\)\".*/\1/' kernel/out/include/generated/utsrelease.h)"
            echo "COMPILER=$("$CLANG_BIN/clang" --version | head -1)"
            echo "BUILD_DATE=$(TZ=Asia/Jakarta date '+%d/%m/%Y %H:%M WIB')"
            echo "ZIP_NAME=Valeryn-SM6115-${VARIANT_UPPER}-${{ github.run_number }}.zip"
          } >> "$GITHUB_ENV"

      - name: Package flashable ZIP
        run: |
          git clone --depth=1 \
            --branch "$AK3_BRANCH" \
            "$AK3_REPO" \
            ak3

          mkdir -p ak3/dtbs
          cp kernel/out/arch/arm64/boot/Image.gz ak3/

          find kernel/out/arch/arm64/boot/dts \
            -name "*.dtb" \
            -exec cp {} ak3/dtbs/ \; 2>/dev/null || true

          [[ -f kernel/out/arch/arm64/boot/dtbo.img ]] && \
            cp kernel/out/arch/arm64/boot/dtbo.img ak3/

          cd ak3
          zip -r9 "$ZIP_NAME" . \
            --exclude '*.git*' \
            --exclude '*.github*'
          ls -lh "$ZIP_NAME"

      - name: Publish build to Telegram
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZIP_PATH:         ${{ github.workspace }}/ak3/${{ env.ZIP_NAME }}
          KSU_COMMIT:       ${{ env.KSU_COMMIT }}
          NOMOUNT_COMMIT:   ${{ env.NOMOUNT_COMMIT }}
          VARIANT:          ${{ matrix.variant }}
        run: |
          python3 - <<'PYEOF'
          import os
          import requests

          variant = os.environ["VARIANT"]

          if variant == "ksu":
              variant_line = "🔐 <b>Variant:</b> KernelSU Next (Hookless) + NoMount"
              ksu_line     = f"🔑 <b>KSU commit:</b> {os.environ['KSU_COMMIT']}"
              nomount_line = f"👻 <b>NoMount commit:</b> {os.environ['NOMOUNT_COMMIT']}"
              hashtags     = "#chime #pocom3 #redmi9t #ksu #nomount"
          else:
              variant_line = "🍦 <b>Variant:</b> Vanilla"
              ksu_line     = None
              nomount_line = None
              hashtags     = "#chime #pocom3 #redmi9t #vanilla"

          lines = [
              "<b>Valeryn Kernel — SM6115</b>",
              "",
              f"🌿 <b>Branch:</b> <code>{os.environ['GIT_BRANCH']}</code>",
              f"🐧 <b>Kernel version:</b> <code>{os.environ['KERNEL_VER']}</code>",
              f"📅 <b>Build date:</b> <code>{os.environ['BUILD_DATE']}</code>",
              f"📝 <b>Latest commit:</b> {os.environ['GIT_COMMIT']}",
              variant_line,
          ]

          if ksu_line:
              lines.append(ksu_line)
          if nomount_line:
              lines.append(nomount_line)

          lines += [
              f"⚙️ <b>Compiler:</b> {os.environ['COMPILER']}",
              "",
              hashtags,
          ]

          caption  = "\n".join(lines)
          zip_path = os.environ["ZIP_PATH"]
          api_url  = (
              f"https://api.telegram.org"
              f"/bot{os.environ['TELEGRAM_TOKEN']}/sendDocument"
          )

          print(f"Uploading: {zip_path}")

          with open(zip_path, "rb") as fh:
              response = requests.post(
                  api_url,
                  data={
                      "chat_id":    os.environ["TELEGRAM_CHAT_ID"],
                      "parse_mode": "HTML",
                      "caption":    caption,
                  },
                  files={"document": fh},
                  timeout=300,
              )

          print(f"HTTP {response.status_code}")
          print(response.text)
          response.raise_for_status()
          PYEOF

      - name: Upload artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: valeryn-sm6115-${{ matrix.variant }}-failed-run${{ github.run_number }}
          path: ak3/${{ env.ZIP_NAME }}
